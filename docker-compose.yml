version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: wypozyczalnia
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app_secret
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

volumes:
  db_data:
